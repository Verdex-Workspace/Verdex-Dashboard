name: Deploy (Vercel)

# Déploiement automatisé sur Vercel, **uniquement si la CI a réussi**.
#   - le workflow se déclenche à la fin de la CI sur `staging`/`main`
#   - push sur `staging` → environnement de pré-production
#   - push sur `main`    → environnement de production
#
# Secrets requis (Settings → Secrets → Actions) :
#   VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main, staging]

concurrency:
  group: deploy-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

env:
  NODE_VERSION: 22
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    name: Déploiement
    runs-on: ubuntu-latest
    # Ne déploie que si la CI déclencheuse s'est terminée avec succès.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: ${{ github.event.workflow_run.head_branch == 'main' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Installation de Vercel CLI
        run: pnpm add -g vercel@latest

      # ---- Production (branche main) ----
      - name: Récupération de la configuration Vercel (production)
        if: github.event.workflow_run.head_branch == 'main'
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build (production)
        if: github.event.workflow_run.head_branch == 'main'
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Déploiement (production)
        if: github.event.workflow_run.head_branch == 'main'
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      # ---- Pré-production (branche staging) ----
      - name: Récupération de la configuration Vercel (preview/staging)
        if: github.event.workflow_run.head_branch == 'staging'
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build (staging)
        if: github.event.workflow_run.head_branch == 'staging'
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
      - name: Déploiement (staging)
        if: github.event.workflow_run.head_branch == 'staging'
        run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
