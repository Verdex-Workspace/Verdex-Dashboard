name: Deploy (Vercel)

# Déploiement automatisé sur Vercel.
#   - push sur `staging` → environnement de pré-production
#   - push sur `main`    → environnement de production
#
# Secrets requis (Settings → Secrets → Actions) :
#   VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
on:
  push:
    branches: [main, staging]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: 22
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    name: Déploiement
    runs-on: ubuntu-latest
    # N'exécute le déploiement que si les secrets Vercel sont configurés.
    if: ${{ github.repository_owner != '' }}
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Installation de Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Récupération de la configuration Vercel (production)
        if: github.ref == 'refs/heads/main'
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build (production)
        if: github.ref == 'refs/heads/main'
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Déploiement (production)
        if: github.ref == 'refs/heads/main'
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Récupération de la configuration Vercel (preview/staging)
        if: github.ref == 'refs/heads/staging'
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build (staging)
        if: github.ref == 'refs/heads/staging'
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
      - name: Déploiement (staging)
        if: github.ref == 'refs/heads/staging'
        run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
