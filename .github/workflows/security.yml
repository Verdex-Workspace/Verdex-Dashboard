name: Security

# Scans de sécurité complémentaires à CodeQL :
#   - gitleaks : détection de secrets dans le code et l'historique
#   - dependency-review : diff des dépendances sur les PR (vulnérabilités / licences)
#   - audit : audit des dépendances installées (pnpm)
on:
  push:
    branches: [main, staging, develop]
  pull_request:
    branches: [main, staging, develop]

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Détection de secrets (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # historique complet pour scanner les commits
      - name: Scan des secrets
        uses: docker://ghcr.io/gitleaks/gitleaks:v8.21.2
        with:
          args: detect --source=. --redact --no-banner --exit-code 1

  dependency-review:
    name: Revue des dépendances (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    # Best-effort : nécessite le « Dependency graph » activé sur le dépôt
    # (Settings → Code security). La porte bloquante sur les vulnérabilités
    # reste `pnpm audit` ci-dessous ; on n'échoue donc pas la CI si le graphe
    # n'est pas (encore) disponible.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  audit:
    name: Audit des dépendances (pnpm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: pnpm audit (échoue sur vulnérabilité haute/critique)
        run: pnpm audit --audit-level=high
