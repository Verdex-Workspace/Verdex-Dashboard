version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    commit-message:
      prefix: build
      include: scope
    groups:
      vue-ecosystem:
        patterns: ['vue', 'vue-*', '@vue/*', 'pinia', 'vue-router']
      dev-tooling:
        patterns: ['eslint*', 'prettier', '@typescript-eslint/*', 'vite', 'vitest', '@vitest/*']

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
