# ============================================================
# Stack de développement local du Verdex Dashboard.
#   docker compose up        → app (Vite) + Redis + Postgres
#   docker compose --profile prod up app-prod → image Nginx de prod
# ============================================================

services:
  # ---- Frontend en mode développement (hot reload) ----
  app:
    build:
      context: .
      target: dev
    container_name: verdex-app
    ports:
      - '5173:5173'
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env.development
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  # ---- Image de production (Nginx) — profil optionnel ----
  app-prod:
    build:
      context: .
      target: prod
    container_name: verdex-app-prod
    ports:
      - '8080:80'
    profiles: ['prod']
    restart: unless-stopped

  # ---- Cache Redis ----
  redis:
    image: redis:7-alpine
    container_name: verdex-redis
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    command: ['redis-server', '--save', '60', '1', '--loglevel', 'warning']
    restart: unless-stopped

  # ---- Base de données PostgreSQL (alternative locale à Supabase) ----
  postgres:
    image: postgres:16-alpine
    container_name: verdex-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: verdex
      POSTGRES_PASSWORD: verdex
      POSTGRES_DB: verdex_dashboard
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  redis-data:
  postgres-data:
